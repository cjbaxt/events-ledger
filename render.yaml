services:
  - type: web
    name: events-ledger-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: events-ledger-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.0

databases:
  - name: events-ledger-db
    databaseName: events_ledger
    plan: free
