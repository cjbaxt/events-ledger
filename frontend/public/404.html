<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // Redirect unknown paths to the index, preserving the path as a query param
    // so the app can restore the correct state on load.
    var path = window.location.pathname.replace('/events-ledger', '');
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = '/events-ledger/?redirect=' + encodeURIComponent(path + search + hash);
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
